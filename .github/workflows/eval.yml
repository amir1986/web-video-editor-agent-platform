name: Evaluation

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  evaluate:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests jsonschema

    - name: Run evaluation
      run: |
        python eval_script.py
      env:
        PYTHONPATH: "."
