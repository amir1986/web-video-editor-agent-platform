name: AI Merge Conflict Resolver

on:
  pull_request:
    types: [opened, synchronize]

jobs:
  conflict-check:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check for conflicts
        id: conflict_check
        run: |
          git fetch origin
          if git merge --no-commit --no-ff origin/main 2>&1 | grep -q 'CONFLICT'; then
            echo 'has_conflict=true' >> $GITHUB_OUTPUT
            git diff --diff-filter=U > conflict_files.txt
          else
            echo 'has_conflict=false' >> $GITHUB_OUTPUT
            git merge --abort 2>/dev/null || true
          fi

      - name: Set up Python
        if: steps.conflict_check.outputs.has_conflict == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        if: steps.conflict_check.outputs.has_conflict == 'true'
        run: pip install anthropic requests

      - name: Get AI resolution suggestion
        if: steps.conflict_check.outputs.has_conflict == 'true'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
        run: python .github/scripts/resolve_conflict.py
